name: qcarchive-worker
channels:
  - conda-forge
  - defaults

dependencies:
  - pip

  # QCPortal dependencies
  # NOTE: msgpack-python in conda is msgpack in pypi (due to a rename around v0.5)
  - numpy
  - msgpack-python
  - requests
  - pyyaml
  - pydantic
  - pydantic-settings
  - zstandard
  - apsw>=3.42
  - qcelemental>=0.50.2,<0.70a0
  - tabulate
  - tqdm
  - pandas
  - pyjwt>=2.10.0
  - packaging
  - python-dateutil
  - pytz

  # QCFractalCompute dependencies
  - parsl

  # Worker codes below
  - qcengine>=0.50,<0.70a0
  - psi4>=1.10.1
  - rdkit
  - geometric>=1.1.1
